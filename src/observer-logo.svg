<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120">
  <defs>
    <!-- 渐变定义 -->
    <linearGradient id="eyeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pupilGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f0f1a;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- 外轮廓 - 眼睛形状 -->
  <path d="M10 60 Q50 10, 100 60 Q150 110, 190 60 Q150 10, 100 60 Q50 110, 10 60 Z" 
        fill="none" 
        stroke="url(#eyeGradient)" 
        stroke-width="4"
        stroke-linecap="round"/>
  
  <!-- 眼眶内部填充 -->
  <ellipse cx="100" cy="60" rx="70" ry="40" fill="#f8fafc" opacity="0.9"/>
  
  <!-- 眼球 -->
  <circle cx="100" cy="60" r="32" fill="url(#pupilGradient)"/>
  
  <!-- 瞳孔高光 -->
  <circle cx="92" cy="52" r="8" fill="#ffffff" opacity="0.4"/>
  <circle cx="88" cy="48" r="3" fill="#ffffff" opacity="0.8"/>
  
  <!-- 装饰性光点 -->
  <circle cx="30" cy="40" r="2" fill="#00d4ff" opacity="0.6"/>
  <circle cx="170" cy="80" r="2" fill="#00d4ff" opacity="0.6"/>
  <circle cx="25" cy="70" r="1.5" fill="#00d4ff" opacity="0.4"/>
  <circle cx="175" cy="45" r="1.5" fill="#00d4ff" opacity="0.4"/>
  
  <!-- 外发光效果 -->
  <ellipse cx="100" cy="60" rx="90" ry="55" fill="url(#glowGradient)"/>
</svg>
